name: Validate Template

on:
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: function-app/package-lock.json

      - name: Install dependencies
        working-directory: function-app
        run: npm ci

      - name: Validate function app
        working-directory: function-app
        run: |
          npm run typecheck
          npm test

      - name: Validate Bicep syntax
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            # Build validates template syntax and catches most authoring mistakes.
            az bicep build --file infra/main.bicep
