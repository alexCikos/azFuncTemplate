name: Deploy Prod Hello World Template

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-prod-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}

    steps:
      - name: Check whether Azure deployment is enabled
        id: check
        run: |
          if [ "${{ vars.ENABLE_AZURE_DEPLOY }}" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Azure deployment is enabled for this repository."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Azure deployment is disabled for this template repository. Configure Azure + GitHub environments, then set the repository variable ENABLE_AZURE_DEPLOY=true to turn on prod deployments."
          fi

  deploy:
    needs: preflight
    if: ${{ needs.preflight.outputs.enabled == 'true' }}
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: function-app/package-lock.json

      - name: Install + validate function
        working-directory: function-app
        run: |
          npm ci
          npm run typecheck
          npm test
          # Keep deployment package small and production-focused.
          npm prune --omit=dev

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infrastructure (Bicep)
        id: infra
        env:
          AZURE_CORE_OUTPUT: none
        run: |
          # Deploy infra only after the app has passed validation checks.
          FUNCTION_APP_NAME=$(az deployment group create \
            -g "${{ vars.AZURE_RG }}" \
            -f infra/main.bicep \
            -p @infra/main.parameters.prod.json \
            --query "properties.outputs.functionAppResourceName.value" \
            -o tsv)

          if [ -z "$FUNCTION_APP_NAME" ]; then
            echo "Bicep output functionAppResourceName is empty." >&2
            exit 1
          fi

          echo "FUNCTION_APP_NAME=$FUNCTION_APP_NAME" >> "$GITHUB_ENV"

      - name: Create deployment package (zip)
        run: |
          cd function-app
          zip -r ../functionapp.zip host.json package.json package-lock.json dist node_modules \
            -x "**/.git/**" \
            -x "**/.github/**" \
            -x "**/.vscode/**" \
            -x "**/local.settings.json" \
            -x "**/node_modules/.cache/**"

      - name: Deploy Function App code
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          package: functionapp.zip
